name: RoadworkDetour
options:
  bundleIdPrefix: com.shimondeitel.detourlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RoadworkDetour:
    type: application
    platform: iOS
    sources:
      - path: RoadworkDetour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.detourlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RoadworkDetour/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RoadworkDetourTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoadworkDetourTests
      - path: RoadworkDetour.storekit
    dependencies:
      - target: RoadworkDetour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.detourlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RoadworkDetourUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RoadworkDetourUITests
    dependencies:
      - target: RoadworkDetour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.detourlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RoadworkDetour:
    build:
      targets:
        RoadworkDetour: all
        RoadworkDetourTests: [test]
        RoadworkDetourUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RoadworkDetour.storekit
    test:
      config: Debug
      storeKitConfiguration: RoadworkDetour.storekit
      targets:
        - RoadworkDetourTests
        - RoadworkDetourUITests
    archive:
      config: Release
